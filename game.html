<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Platformer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
}

/* readability overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  pointer-events: none;
}
</style>
</head>

<body>
<canvas id="c" tabindex="0"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ---------------- FORCE FOCUS (CRITICAL FIX) ---------------- */
canvas.focus();

/* ---------------- INPUT SYSTEM (FULL FIX) ---------------- */
const keys = Object.create(null);

window.addEventListener("keydown", (e) => {
  keys[e.code] = true;

  // stop browser scrolling (IMPORTANT)
  if (
    e.code === "ArrowUp" ||
    e.code === "ArrowDown" ||
    e.code === "ArrowLeft" ||
    e.code === "ArrowRight" ||
    e.code === "Space"
  ) {
    e.preventDefault();
  }
}, { passive: false });

window.addEventListener("keyup", (e) => {
  keys[e.code] = false;
});

window.addEventListener("blur", () => {
  for (let k in keys) keys[k] = false;
});

/* ---------------- BACKGROUND ---------------- */
let bgImg = new Image();
bgImg.src = "mountain.png";

let bgOffset = 0;

/* ---------------- GAME STATE ---------------- */
let player, platforms, cameraY = 0;
let bestHeight = 0;

/* ---------------- COYOTE JUMP ---------------- */
let coyoteTimer = 0;
const COYOTE_TIME = 0.2;

/* ---------------- RESET ---------------- */
function reset() {
  platforms = [];
  cameraY = 0;
  bestHeight = 0;

  let ground = {
    x: 0,
    y: 650,
    w: canvas.width,
    h: 40
  };

  platforms.push(ground);

  player = {
    x: 150,
    y: ground.y - 30,
    w: 30,
    h: 30,
    vx: 0,
    vy: 0,
    onGround: true
  };

  coyoteTimer = COYOTE_TIME;

  for (let i = 0; i < 18; i++) {
    platforms.push({
      x: Math.random() * (canvas.width - 120),
      y: 600 - i * 90,
      w: 120,
      h: 15
    });
  }
}

reset();

/* ---------------- COLLISION ---------------- */
function hit(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

/* ---------------- UPDATE ---------------- */
function update(dt) {

  // coyote time
  if (player.onGround) {
    coyoteTimer = COYOTE_TIME;
  } else {
    coyoteTimer = Math.max(0, coyoteTimer - dt);
  }

  // movement (stable + consistent)
  if (keys["KeyA"] || keys["ArrowLeft"]) player.vx -= 0.8;
  if (keys["KeyD"] || keys["ArrowRight"]) player.vx += 0.8;

  player.vx *= 0.92;

  // jump
  if ((keys["Space"] || keys["KeyW"] || keys["ArrowUp"]) && coyoteTimer > 0) {
    player.vy = -15;
    player.onGround = false;
    coyoteTimer = 0;
  }

  // gravity
  player.vy += 0.5;

  player.vx = Math.max(-6, Math.min(6, player.vx));
  player.vy = Math.min(18, player.vy);

  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;

  // collision
  for (let p of platforms) {
    if (hit(player, p) && player.vy > 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // camera
  cameraY += (player.y - cameraY - 200) * 0.08;

  // score
  let h = Math.floor(600 - player.y);
  if (h > bestHeight) bestHeight = h;

  // reset if fall
  if (player.y > cameraY + canvas.height + 200) {
    reset();
  }
}

/* ---------------- DRAW ---------------- */
function draw() {

  // background loop
  bgOffset += 0.3;
  let x = -(bgOffset % canvas.width);

  for (let i = -1; i < 3; i++) {
    ctx.drawImage(bgImg, x + i * canvas.width, 0, canvas.width, canvas.height);
  }

  // platforms
  ctx.fillStyle = "#b56bff";
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y - cameraY, p.w, p.h);
  }

  // player
  ctx.fillStyle = "#00e5ff";
  ctx.fillRect(player.x, player.y - cameraY, player.w, player.h);

  // score (outlined text)
  ctx.font = "24px Arial";
  ctx.lineWidth = 4;
  ctx.strokeStyle = "black";
  ctx.fillStyle = "white";

  ctx.strokeText("Score: " + bestHeight, 20, 40);
  ctx.fillText("Score: " + bestHeight, 20, 40);
}

/* ---------------- LOOP ---------------- */
let last = 0;

function loop(t) {
  let dt = (t - last) / 1000;
  last = t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

loop(0);
</script>

</body>
</html>
